name: Build NovaSynth APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms and build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN="/tmp/gradle-dist/gradle-8.2/bin/gradle"
          chmod +x "$GRADLE_BIN"
          "$GRADLE_BIN" wrapper --gradle-version 8.2
          chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaSynth-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
